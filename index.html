<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>灵魂拷问</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #1a1a2e; color: #eee; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px; overflow-x: hidden; overflow-y: auto;
    position: relative;
  }
  .container { width: 100%; max-width: 420px; }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 22px; margin: 14px 0;
    text-align: center;
  }

  .btn-agree {
    display: block; padding: 18px; border: none; border-radius: 16px;
    background: #16213e; color: #aaf; font-size: 18px; font-weight: 700;
    cursor: pointer; transition: all 0.3s; letter-spacing: 2px;
    margin: 0 auto; text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    user-select: none; -webkit-tap-highlight-color: transparent;
  }

  .btn-deny {
    display: inline-block; padding: 18px 28px; border: 2px dashed #555;
    border-radius: 16px; background: transparent; color: #999;
    font-size: 18px; font-weight: 700; cursor: pointer;
    transition: all 0.25s ease; letter-spacing: 2px;
    position: relative;
    user-select: none; -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #333; color: #ffa; padding: 12px 24px;
    border-radius: 25px; font-size: 14px; font-weight: 600;
    z-index: 999; animation: toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5); max-width: 90%;
    text-align: center; pointer-events: none;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-30px); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }

  .counter {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: #444; z-index: 100;
  }

  .tracker { font-size: 12px; color: #555; margin-top: 8px; }

  .fade-in { animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .zoom-big { animation: zoomBig 0.6s ease forwards; }
  @keyframes zoomBig { to { transform: scale(1.5); opacity: 0; } }

  .shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    30% { transform: translateX(-8px); }
    60% { transform: translateX(8px); }
    90% { transform: translateX(-4px); }
  }

  .green { color: #7f7; }
  .yellow { color: #ffa; }
  .red { color: #f77; }
  .dim { color: #666; font-size: 13px; }
  .big-text { font-size: 48px; }
  .mid-text { font-size: 20px; }
  .sm-text { font-size: 13px; }

  .cert {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 2px solid #ffd700; border-radius: 16px; padding: 30px 20px;
    text-align: center; position: relative; overflow: hidden;
  }
  .cert::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: conic-gradient(from 0deg, transparent, rgba(255,215,0,0.05), transparent, rgba(255,215,0,0.05), transparent);
    animation: rotate 8s linear infinite;
  }
  @keyframes rotate { 100% { transform: rotate(360deg); } }
  .cert-inner { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="container" id="app"></div>
<div id="toastArea"></div>
<div class="counter" id="counter"></div>

<script>
var root = document.getElementById('app');
var toastArea = document.getElementById('toastArea');
var counterEl = document.getElementById('counter');
var denyClicks = 0;
var requiredClicks = 10;
var denyBtnMoving = false;

var zingers = [
  '她上周的早八出勤率：0/5 🤣',
  '室友原话：想见她一面比见辅导员还难',
  '她的闹钟一共设了20个，没一个管用',
  '床对她的评价：最忠实的伴侣',
  '她的活动轨迹：床→拿外卖→床',
  '百度地图：该用户运动半径不足50米',
  '辅导员：臧yx是谁？怎么从没见过',
  '外卖小哥：又是你？？今天第三顿了',
  '她的手机相册：80%是躺着拍的',
  '据统计，她每天平均步数：三位数',
  '她说过最多的话：「再睡五分钟」',
  '昨晚她说「明天一定早起」——现在呢？',
  '她的微信签名可以改成：在睡觉，勿扰',
  '如果睡觉是奥运项目，她已经拿金牌了',
  '她的被窝：已经长出亲情了',
  '唯一能让她起床的理由：快递到了',
  '她室友说：灯一关她就消失，灯一开她就出现，跟会遁地似的',
  '让她早起的难度 ≈ 让她不玩手机',
  '她的英语四级听力：zZZzzzZZzz...',
  '她的特长：用任何姿势睡着',
  '她是寝室熄灯后第一个睡着的，也是第二天最后醒的',
  '叫她起床的室友已经放弃，改为帮她带饭',
  '她躺平的姿势比专业课知识还扎实',
  '她的人生格言：能坐着绝不站着，能躺着绝不坐着',
  '同学对她的印象：好像总是在睡觉',
  '她的每日规划：上午睡觉，下午躺着，晚上继续睡',
];

function showToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  t.style.top = (20 + Math.random() * 60) + 'px';
  toastArea.appendChild(t);
  setTimeout(function() { t.remove(); }, 2200);
}

// S1: 开场
function s1() {
  h(`
    <div class="card fade-in">
      <p class="mid-text mb16">📋 大学生综合素质评估</p>
      <p class="dim">本评估由室友委员会 + AI大数据 + 寝室观察团联合出品</p>
      <p class="dim">评估对象：<span class="yellow">臧yx</span></p>
    </div>
    <div class="card fade-in">
      <p class="dim">评估维度：</p>
      <p class="dim">☑ 起床积极性</p>
      <p class="dim">☑ 外卖下单频率</p>
      <p class="dim">☑ 每日步数统计</p>
      <p class="dim">☑ 课桌到床的往返速度</p>
    </div>
    <button class="btn-agree" onclick="s2()" style="font-size:16px;width:100%;padding:16px;">
      ▸ 开始评估
    </button>
    <p class="dim">* 结果将同步至寝室群</p>
  `);
}

// S2: 假数据展示
function s2() {
  h(`
    <div class="card fade-in">
      <p class="mid-text yellow mb8">⏳ 数据收集中...</p>
      <p class="dim">正在调取臧yx的日常行为数据</p>
    </div>
    <div class="card fade-in">
      <p class="dim l2" style="text-align:left;line-height:2.2;">
        🔍 近30天早课签到率：<span class="red">13.3%</span><br>
        🔍 日均外卖下单数：<span class="yellow">2.7 单</span><br>
        🔍 日均手机使用时长：<span class="red">11.4 小时</span><br>
        🔍 其中躺姿占比：<span class="yellow">92%</span><br>
        🔍 日均步数：<span class="red">487 步</span><br>
        🔍 寝室→教室的距离：<span class="dim">约300米</span><br>
        🔍 这个距离她打车去过：<span class="yellow">3次</span>
      </p>
    </div>
    <button class="btn-agree" onclick="s3()" style="font-size:16px;width:100%;padding:16px;">
      ▸ 查看综合判定
    </button>
  `);
}

// S3: 核心拷问 - 两个按钮
function s3() {
  denyClicks = 0;
  updateCounter();
  h(`
    <div class="card fade-in">
      <p class="mid-text mb16">⚠️ 请根据以上数据回答</p>
      <p style="font-size:22px;font-weight:800;line-height:1.6;">
        <span class="yellow">臧yx</span> 是否<br>好吃且懒做？
      </p>
      <p class="dim" style="margin-top:12px;">请做出公平公正的判断</p>
    </div>
    <div id="agreeArea" style="text-align:center;margin:16px 0;">
      <button class="btn-agree" id="agreeBtn" onclick="finish()" style="width:85%;font-size:20px;padding:22px;">
        ✅ 我认可<br><span style="font-size:12px;font-weight:400;color:#888;">（事实就是如此）</span>
      </button>
    </div>
    <div id="denyArea" style="text-align:center;margin:20px 0;position:relative;min-height:70px;display:flex;align-items:center;justify-content:center;">
      <button class="btn-deny" id="denyBtn" ontouchstart="hitDeny(event)" onclick="hitDeny(event)">
        ❌ 我不认可
      </button>
    </div>
    <div class="tracker" id="tracker">仍需点击 <span id="remain">${requiredClicks}</span> 次「我不认可」才能提交</div>
  `);
}

function updateCounter() {
  var remain = requiredClicks - denyClicks;
  if (remain <= 0) remain = 0;
  var remainEl = document.getElementById('remain');
  var trackerEl = document.getElementById('tracker');
  if (remainEl) remainEl.textContent = remain;
  if (trackerEl) {
    if (remain <= 0) trackerEl.innerHTML = '<span class="green">✅ 够了够了，你可以选了</span>';
    else if (denyClicks >= 7) trackerEl.innerHTML = '仍需点击 <span id="remain" class="yellow">' + remain + '</span> 次「我不认可」才能提交  快了快了';
    else trackerEl.innerHTML = '仍需点击 <span id="remain">' + remain + '</span> 次「我不认可」才能提交';
  }
}

window.hitDeny = function(e) {
  if (e) e.preventDefault();
  if (denyBtnMoving) return;
  denyBtnMoving = true;

  denyClicks++;
  showToast(zingers[(denyClicks - 1) % zingers.length]);
  updateCounter();

  var denyArea = document.getElementById('denyArea');
  var denyBtn = document.getElementById('denyBtn');

  if (denyClicks >= requiredClicks) {
    denyBtn.style.border = '2px solid #7f7';
    denyBtn.style.color = '#7f7';
    denyBtn.style.fontSize = '20px';
    denyBtn.style.padding = '22px 32px';
    denyBtn.textContent = '😤 我不认可！（够了！）';
    denyBtn.onclick = function(e) { e.preventDefault(); finish(); };
    denyBtnMoving = false;
    return;
  }

  // 缩小
  var scale = Math.max(0.35, 1 - denyClicks * 0.06);
  denyBtn.style.transform = 'scale(' + scale + ')';

  // 随机跑开
  var maxX = denyArea.clientWidth - denyBtn.offsetWidth * scale;
  var maxY = denyArea.clientHeight - denyBtn.offsetHeight * scale;
  maxX = Math.max(maxX, 40);
  maxY = Math.max(maxY, 20);
  var x = Math.random() * maxX - maxX/2;
  var y = Math.random() * maxY - maxY/2;
  denyBtn.style.position = 'relative';
  denyBtn.style.left = x + 'px';
  denyBtn.style.top = y + 'px';

  // 抖动
  denyArea.classList.add('shake');
  setTimeout(function() { denyArea.classList.remove('shake'); }, 400);

  var agreeBtn = document.getElementById('agreeBtn');
  var agreeScale = 1 + denyClicks * 0.06;
  agreeBtn.style.transform = 'scale(' + agreeScale + ')';
  agreeBtn.style.transition = 'transform 0.3s ease';

  setTimeout(function() { denyBtnMoving = false; }, 300);
};

// 结局
function finish() {
  document.body.style.background = '#0d0d1a';
  h(`
    <div class="cert fade-in">
      <div class="cert-inner">
        <p class="dim">🏆 大学生综合素质评估委员会 🏆</p>
        <p class="dim" style="margin:8px 0;">（全体室友 + AI + 外卖小哥联合认证）</p>
        <p style="font-size:60px;margin:16px 0;">😴</p>
        <p class="mid-text yellow" style="margin:8px 0;">经综合评估，一致认定</p>
        <p style="font-size:28px;font-weight:900;color:#ffd700;margin:12px 0;letter-spacing:3px;">
          臧 yx
        </p>
        <p style="font-size:22px;font-weight:800;color:#fff;margin:12px 0;line-height:1.8;">
          荣获<br><span style="font-size:36px;color:#ffd700;">「睡神」</span><br>荣誉称号
        </p>
        <div style="background:rgba(255,255,255,0.03);border-radius:12px;padding:16px;margin:16px 0;text-align:left;line-height:2.2;">
          <p class="dim">🏅 日均睡眠时长：<span class="yellow">10h+</span>（保守估计）</p>
          <p class="dim">🏅 起床失败次数：<span class="red">不计其数</span></p>
          <p class="dim">🏅 寝室懒人指数：<span class="yellow">断层第一</span></p>
          <p class="dim">🏅 外卖平台等级：<span class="yellow">至尊VIP</span></p>
          <p class="dim">🏅 躺平学研究：<span class="yellow">已达博士后水平</span></p>
        </div>
        <p class="dim">发证方：你的好朋友们</p>
        <p class="dim">有效期：永久（除非你明天真的早起了）</p>
        <p class="dim" style="margin-top:4px;">证书编号：ZZZ-${new Date().getFullYear()}-${String(denyClicks).padStart(2,'0')}</p>
      </div>
    </div>
    <button class="btn-agree" onclick="location.reload()" style="width:100%;margin-top:20px;font-size:16px;padding:16px;">
      🔄 换个人再测
    </button>
    <p style="text-align:center;margin-top:24px;color:#444;font-size:13px;">纯属娱乐 · 感情深才这样 · 别打我</p>
  `);
  counterEl.textContent = '';
}

s1();
</script>
</body>
</html>
