<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>.</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #000; color: #f00;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 10px; overflow-x: hidden;
  }
  .container { width: 100%; max-width: 420px; }
  .card {
    border: 1px solid #300; border-radius: 6px; padding: 16px; margin: 10px 0;
    background: rgba(40,0,0,0.6);
  }
  .card.glitch-box { border-color: #600; animation: glitchBox 4s infinite; }
  @keyframes glitchBox {
    0%,90%,100% { transform: none; opacity: 1; }
    92% { transform: translate(-3px, 2px); opacity: 0.8; }
    94% { transform: translate(3px, -1px); opacity: 1; }
    96% { transform: translate(-1px, -2px); opacity: 0.9; }
    98% { transform: translate(2px, 1px); }
  }
  .btn {
    display: block; width: 100%; padding: 14px; margin: 8px 0;
    border: 1px solid #500; background: rgba(80,0,0,0.4);
    color: #f00; font-family: inherit; font-size: 15px;
    border-radius: 4px; cursor: pointer; letter-spacing: 2px;
    transition: all 0.15s;
  }
  .btn:active { background: #600; border-color: #f00; }
  .btn:disabled { opacity: 0.3; pointer-events: none; }
  .bar {
    width: 100%; height: 6px; background: rgba(255,0,0,0.1);
    border-radius: 3px; overflow: hidden; margin: 8px 0;
  }
  .bar-fill { height: 100%; background: #f00; width: 0%; transition: width 0.4s; }
  .hidden { display: none !important; }
  .center { text-align: center; }
  .blink { animation: blinker 0.8s step-end infinite; }
  @keyframes blinker { 50% { opacity: 0; } }
  .flicker { animation: flicker 0.15s infinite; }
  @keyframes flicker {
    0%,100% { opacity: 1; }
    41% { opacity: 0.8; }
    43% { opacity: 0.3; }
    47% { opacity: 1; }
    67% { opacity: 0.6; }
    69% { opacity: 0.1; }
  }
  .shake { animation: shaker 0.3s ease 3; }
  @keyframes shaker {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .zoom { animation: zoomer 0.6s ease; }
  @keyframes zoomer {
    0% { transform: scale(0.1) rotate(0deg); opacity: 0; }
    60% { transform: scale(1.1) rotate(5deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .glitch-txt { animation: glitchText 2s infinite; }
  @keyframes glitchText {
    0%,90%,100% { transform: none; }
    91% { transform: skewX(2deg) translateX(-2px); }
    93% { transform: skewX(-1deg) translateX(2px); }
    95% { transform: skewX(1deg); }
  }
  .red { color: #f00; }
  .white { color: #ccc; }
  .dim { color: #600; font-size: 12px; }
  .fz14 { font-size: 14px; }
  .fz18 { font-size: 18px; }
  .fz22 { font-size: 22px; }
  .fz28 { font-size: 28px; }
  .fz36 { font-size: 36px; }
  .mb8 { margin-bottom: 8px; }
  .mb16 { margin-bottom: 16px; }
  .l2 { line-height: 2; }
</style>
</head>
<body>

<div class="container" id="app"></div>
<div id="overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:999;pointer-events:none;opacity:0;transition:opacity 0.1s;"></div>

<script>
var root = document.getElementById('app');
var overlay = document.getElementById('overlay');
var userName = '';

function flash() {
  overlay.style.opacity = '1';
  setTimeout(function() { overlay.style.opacity = '0'; }, 80);
}
function crashFlash(count, speed) {
  if (count <= 0) return;
  overlay.style.opacity = (count % 2) ? '1' : '0';
  setTimeout(function() { crashFlash(count - 1, speed); }, speed);
}

function h(t) { root.innerHTML = t; }

// S1: 假警告
function s1() {
  h(`
    <div class="card glitch-box center">
      <p class="fz28 mb8">⚠️</p>
      <p class="fz18 red mb8 glitch-txt">WARNING</p>
      <p class="fz14 white">检测到未知设备接入</p>
      <p class="fz14 white">安全协议已触发</p>
      <p class="dim blink">SYS_ALERT_0x0001</p>
    </div>
    <button class="btn" onclick="s2()">▸ 查看详情</button>
    <button class="btn" onclick="s2()">▸ 忽略警告（不推荐）</button>
  `);
}

// S2: 假授权协议
function s2() {
  flash();
  h(`
    <div class="card center">
      <p class="red mb8">[ 系统安全协议 v6.6.6 ]</p>
      <p class="dim l2 mb8">
        根据《网络安全法》第 404 条<br>
        本设备需进行强制安全审查<br>
        继续即表示你同意以下条款：
      </p>
      <p class="dim l2" style="color:#500;">
        1. 允许读取设备灵魂数据<br>
        2. 允许AI扫描所有脑电波<br>
        3. 允许接入赛博冥界数据库<br>
        4. 放弃对本系统的任何反抗
      </p>
    </div>
    <div class="card center" style="border-color:#500;">
      <p class="fz28 blink red">🔴</p>
      <p class="fz14 white">威胁等级：<span class="red blink">CRITICAL</span></p>
    </div>
    <button class="btn" onclick="s3()">▸ 同意并继续</button>
  `);
}

// S3: 假扫描
function s3() {
  h(`
    <div class="card center">
      <p class="red blink mb8">▌▌▌ 正在扫描设备 ▌▌▌</p>
      <div class="bar"><div class="bar-fill" id="b1"></div></div>
      <p class="dim" id="t1">初始化...</p>
    </div>
  `);

  var jobs = [
    [25, '读取联系人...', '发现 666 个未知实体'],
    [45, '扫描相册...', '检测到 233 张表情包'],
    [65, '分析通信记录...', '拦截到 999 条神秘信号'],
    [82, '检索浏览器历史...', '发现深夜搜索记录 404 条'],
    [94, '破解生物特征...', 'DNA 样本已采集'],
    [100, '最终分析中...', '结果异常——'],
  ];

  jobs.forEach(function(j, i) {
    setTimeout(function() {
      document.getElementById('b1').style.width = j[0] + '%';
      document.getElementById('t1').textContent = j[1];
      if (j[2]) {
        setTimeout(function() {
          document.getElementById('t1').textContent = j[2];
        }, 300);
      }
    }, i * 900);
  });
  setTimeout(s4, jobs.length * 900 + 800);
}

// S4: 输入名字
function s4() {
  flash(); flash();
  h(`
    <div class="card center" style="border-color:#600;">
      <p class="fz18 red blink mb8">⚠️ 发现高危异常 ⚠️</p>
      <p class="fz14 white mb16">该系统检测到一名「高危人员」<br>请确认目标身份：</p>
      <input id="inp" type="text" placeholder="输入目标姓名..."
        style="width:100%;padding:12px;background:transparent;border:1px solid #500;
        color:#f00;font-size:16px;font-family:inherit;text-align:center;outline:none;border-radius:4px;">
    </div>
    <button class="btn" onclick="subName()">▸ 确认目标</button>
  `);
  var inp = document.getElementById('inp');
  if (inp) inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') subName(); });
}
window.subName = function() {
  userName = document.getElementById('inp').value || '未知目标';
  if (userName.length > 20) userName = userName.slice(0, 20);
  s5();
};

// S5: 假数据泄露展示
function s5() {
  flash();
  var fakeTime = new Date().toLocaleTimeString('zh-CN', {hour12: false});
  var fakeIP = '192.168.' + Math.floor(Math.random() * 255) + '.' + Math.floor(Math.random() * 255);
  h(`
    <div class="card center flicker" style="border-color:#700;">
      <p class="fz22 red mb8">🔴 BREACHED 🔴</p>
      <p class="white fz14 l2">
        目标：[ <span class="red">${userName}</span> ]<br>
        入侵时间：${fakeTime}<br>
        IP地址：${fakeIP}<br>
        设备指纹：已获取<br>
        数字灵魂：已捕获<br>
      </p>
    </div>
    <div class="card center">
      <p class="red mb8">[ 正在窃取以下数据... ]</p>
      <p class="dim l2">
        ▓▓▓▓▓▓▓▓▓▓ 聊天记录 100%<br>
        ▓▓▓▓▓▓▓▓▓▓ 浏览器历史 100%<br>
        ▓▓▓▓▓▓▓▓▓▓ 深夜动态 100%<br>
        ▓▓▓▓▓▓▓▓▓▓ 大脑内存 100%<br>
      </p>
    </div>
    <button class="btn" onclick="s6()">▸ 查看窃取结果</button>
  `);
}

// S6: 阴间诊断
function s6() {
  crashFlash(8, 120);
  setTimeout(function() {
    var diagnoses = [
      ['精神状况', '极度不稳定', '建议立刻休息（但没用）'],
      ['社交人格', '互联网抽象型', '线上线下判若两人'],
      ['脑回路', '量子纠缠态', '连你自己都不知道在想啥'],
      ['语言系统', '已崩溃', '只会发哈哈哈和表情包'],
      ['睡眠质量', '不存在', '凌晨3点是你最清醒的时刻'],
      ['精神状态', '遥遥领先', '#精神状态# 已成为你的标签'],
      ['记忆能力', '选择性失忆', '记得十年前尴尬事，忘了昨天吃了啥'],
      ['表情包库存', '溢出', '你手机里 90% 都是表情包'],
      ['抽象指数', '超越测量上限', '仪器已过载烧毁'],
    ];
    var selected = diagnoses.sort(function() { return Math.random() - 0.5; }).slice(0, 5);

    var rows = selected.map(function(d) {
      return '<p class="white fz14">' + d[0] + '：<span class="red">' + d[1] + '</span><br><span class="dim">' + d[2] + '</span></p>';
    }).join('<br>');

    h(`
      <div class="card" style="border-color:#600;">
        <p class="fz18 red center mb16 blink">▌ ${userName} · 深度检测报告 ▌</p>
        ${rows}
      </div>
      <div class="card center" style="border-color:#400;">
        <p class="fz14 white mb8">综合评定：</p>
        <p class="fz22 red glitch-txt">⚠️ 高危抽象个体 ⚠️</p>
        <p class="dim">建议立即远离正常人群</p>
        <p class="dim">威胁等级：<span class="red blink">SSS+</span></p>
      </div>
      <button class="btn" onclick="s7()">▸ 进入下一阶段</button>
    `);
  }, 1200);
}

// S7: 多选项灵魂拷问
function s7() {
  h(`
    <div class="card center">
      <p class="red mb8">[ 灵魂审讯程序已启动 ]</p>
      <p class="fz14 white">以下问题必须作答<br>撒谎将被系统标记为「嘴硬」</p>
    </div>
    <div class="card">
      <p class="fz14 white mb8">Q1：凌晨三点，你在做什么？</p>
    </div>
    <button class="btn" onclick="pick('q1a')">A. 刷视频刷到精神恍惚</button>
    <button class="btn" onclick="pick('q1b')">B. 思考宇宙和人生的尽头</button>
    <button class="btn" onclick="pick('q1c')">C. 在群里发癫</button>
    <button class="btn" onclick="pick('q1d')">D. 以上全部</button>
  `);
}
window.pick = function(opt) {
  var btns = document.querySelectorAll('.btn');
  btns.forEach(function(b) { b.disabled = true; });
  flash();
  setTimeout(function() {
    h(`
      <div class="card center">
        <p class="red mb8">[ Q1 已完成 ]</p>
        <p class="dim">答案已记录</p>
        <p class="dim blink">AI分析中...</p>
      </div>
      <div class="card">
        <p class="fz14 white mb8">Q2：看到这条消息时你是什么表情？</p>
      </div>
      <button class="btn" onclick="pick2('q2a')">A. 😨</button>
      <button class="btn" onclick="pick2('q2b')">B. 😱</button>
      <button class="btn" onclick="pick2('q2c')">C. 🤡</button>
      <button class="btn" onclick="pick2('q2d')">D. 面无表情但内心波涛汹涌</button>
    `);
  }, 600);
};
window.pick2 = function(opt) {
  var btns = document.querySelectorAll('.btn');
  btns.forEach(function(b) { b.disabled = true; });
  flash(); flash();
  setTimeout(function() {
    h(`
      <div class="card center" style="border-color:#700;">
        <p class="fz28 red mb8">⚠️</p>
        <p class="fz14 white">你已通过所有测试</p>
        <p class="fz14 white">但——</p>
        <p class="fz18 red glitch-txt blink">系统不想放过你</p>
      </div>
      <button class="btn" onclick="s8()">▸ 继续（无法逃跑）</button>
    `);
  }, 600);
};

// S8: 假崩溃
function s8() {
  crashFlash(12, 90);
  document.body.style.background = '#0a0000';
  setTimeout(function() {
    h(`
      <div class="card center shake" style="border-color:#800;">
        <p class="fz36 red mb8">☠</p>
        <p class="fz18 red glitch-txt">SYSTEM CORRUPTED</p>
        <p class="dim">0x000000F4</p>
        <p class="dim">KERNEL_DATA_INPAGE_ERROR</p>
        <p class="dim blink">物理内存转储中...</p>
      </div>
      <div class="card flicker" style="border-color:#600;">
        <p class="fz14 white center">
          系统检测到<br>
          <span class="red fz18">${userName}</span><br>
          的数字灵魂与正常人类不兼容<br><br>
          <span class="red">建议：</span><br>
          立即格式化人际关系<br>
          重新安装大脑操作系统<br>
        </p>
      </div>
      <button class="btn" onclick="s9()">▸ 尝试修复（很可能失败）</button>
    `);
  }, 1400);
}

// S9: 假修复 + 最终诊断
function s9() {
  h(`
    <div class="card center">
      <p class="red mb8">[ 正在尝试修复... ]</p>
      <div class="bar"><div class="bar-fill" id="b2"></div></div>
      <p class="dim" id="t2">连接赛博冥界服务器...</p>
    </div>
  `);
  var fixes = [
    [30, '扫描数据损坏区...', '损坏严重，无法修复'],
    [55, '尝试重置脑回路...', '重置失败，脑回路过于抽象'],
    [70, '联系冥界技术支持...', '技术支持已下班'],
    [85, '启动终极修复方案...', '方案已崩溃'],
    [99, '放弃修复...', '系统选择接受现实'],
  ];
  fixes.forEach(function(f, i) {
    setTimeout(function() {
      document.getElementById('b2').style.width = f[0] + '%';
      document.getElementById('t2').textContent = f[1];
      if (f[2]) {
        setTimeout(function() {
          document.getElementById('t2').textContent = f[1] + ' — ' + f[2];
        }, 350);
      }
    }, i * 800);
  });
  setTimeout(s10, fixes.length * 800 + 800);
}

// S10: 最终阴间诊断书
function s10() {
  crashFlash(6, 150);
  document.body.style.background = '#000';
  var titles = [
    '赛博冥界永久居民',
    '互联网数字幽灵',
    '深夜抽象亡灵',
    '表情包非物质遗产',
    '人类社交系统BUG',
    '精神不稳定核心成员',
    '脑电波紊乱携带者',
    '社交媒体重度成瘾者',
    '现实与网络人格分裂体',
    '已确认不可修复个体',
    '抽象文化的最终形态',
    '凌晨三点活跃物种',
  ];
  var t = titles[Math.floor(Math.random() * titles.length)];

  h(`
    <div class="card center zoom" style="border-color:#800;">
      <p class="fz28 mb8">💀</p>
      <p class="fz18 red mb16 glitch-txt">[ 最终诊断书 ]</p>
      <p class="fz14 white l2 mb8">
        经赛博冥界AI系统深度分析<br>
        结合区块链+云计算+量子计算<br>
        对目标 <span class="red fz18">${userName}</span> 作出以下判定：
      </p>
      <div class="card" style="border-color:#600;">
        <p class="fz22 red center mb8">${t}</p>
        <p class="fz14 white center l2">
          诊断编号：#${Math.random().toString(36).substring(2, 10).toUpperCase()}<br>
          签发机构：赛博冥界管理局<br>
          有效期限：<span class="red blink">永久</span><br>
          备注：此诊断无法上诉
        </p>
      </div>
      <p class="dim mt8">* 系统将于 5 秒后自毁 *</p>
    </div>
    <button class="btn" onclick="s11()">▸ 紧急逃生出口</button>
  `);
}

// S11: 假自毁倒计时
function s11() {
  var count = 10;
  function tick() {
    if (count < 0) {
      h(`
        <div class="card center flicker" style="border-color:#f00;">
          <p class="fz36 red mb16">☠</p>
          <p class="fz18 red glitch-txt">SYSTEM DESTROYED</p>
          <p class="dim">但其实什么都没发生</p>
          <p class="dim">你被骗了</p>
        </div>
        <button class="btn" onclick="location.reload()">▸ 从头再来</button>
        <p class="dim center" style="margin-top:20px;">纯属娱乐 切勿当真</p>
      `);
      return;
    }
    flash();
    h(`
      <div class="card center shake">
        <p class="fz28 red mb8 blink">⚠️ 系统自毁中 ⚠️</p>
        <p class="fz36 red glitch-txt">${count}</p>
        <p class="dim">逃跑已经来不及了</p>
      </div>
    `);
    count--;
    setTimeout(tick, 800);
  }
  tick();
}

s1();
</script>
</body>
</html>
