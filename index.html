<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title> Loading...</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
    background:#0f0f1a;color:#ccc;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:16px;overflow-x:hidden;position:relative;
  }
  .wrap{width:100%;max-width:420px}
  .card{
    background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;padding:20px;margin:12px 0;text-align:center
  }
  .btn-go{
    display:block;width:85%;padding:20px;margin:0 auto;border:none;border-radius:16px;
    background:linear-gradient(135deg,#1a3a5c,#1a2a4a);color:#8cf;font-size:20px;font-weight:800;
    cursor:pointer;letter-spacing:2px;transition:all .3s;
    box-shadow:0 6px 24px rgba(0,0,0,.4);text-align:center;
    user-select:none;-webkit-tap-highlight-color:transparent;
  }
  .btn-deny{
    display:inline-block;padding:18px 28px;border:2px dashed #444;
    border-radius:16px;background:transparent;color:#777;
    font-size:18px;font-weight:700;cursor:pointer;
    transition:all .25s ease;letter-spacing:2px;
    position:relative;user-select:none;-webkit-tap-highlight-color:transparent;white-space:nowrap;
  }
  .toast{
    position:fixed;left:50%;transform:translateX(-50%);
    background:#222;color:#ff9;padding:14px 24px;border-radius:25px;
    font-size:14px;font-weight:600;z-index:999;pointer-events:none;
    box-shadow:0 10px 40px rgba(0,0,0,.6);max-width:88%;text-align:center;line-height:1.5;
    animation:toastIn .25s ease, toastOut .25s ease 2s forwards;
  }
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-30px)}}
  @keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}
  .progress-wrap{
    margin:20px 0 8px;text-align:center
  }
  .progress-bar{
    width:100%;height:10px;background:rgba(255,255,255,0.05);border-radius:5px;overflow:hidden;margin:0 auto
  }
  .progress-fill{
    height:100%;border-radius:5px;transition:width .3s ease;background:#ff9;width:0%
  }
  .progress-label{font-size:12px;color:#555;margin-top:6px}
  .fade-in{animation:fadeIn .5s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .shake{animation:shake .35s ease}
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-10px)}
    50%{transform:translateX(10px)}
    75%{transform:translateX(-6px)}
  }
  .pop{animation:pop .4s ease}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
  .g{color:#8f8}.y{color:#ff9}.r{color:#f77}.dim{color:#555;font-size:13px}
  .m{font-size:20px}.s{font-size:13px}.l{font-size:28px}.xl{font-size:40px}
  .cert{
    background:linear-gradient(135deg,#111122,#1a1a30);border:2px solid #c9a84c;
    border-radius:16px;padding:28px 18px;text-align:center;position:relative;overflow:hidden
  }
  .cert::before{
    content:'';position:absolute;top:0;left:0;width:100%;height:100%;
    border:2px solid rgba(201,168,76,.15);border-radius:16px;
    animation:certPulse 2s ease-in-out infinite;pointer-events:none
  }
  @keyframes certPulse{0%,100%{opacity:.3}50%{opacity:.8}}
  .cert-body{position:relative;z-index:1}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div id="toasts"></div>
<script>
var A=document.getElementById('app'),T=document.getElementById('toasts');
var clicks=0,need=10,moving=false;
var quotes=[
  '臧yx的早八出勤率：<b>0/5</b>，老师以为她退学了',
  '室友原话：\"想见yx一面？建议蹲守外卖架，概率更高\"',
  '她定了20个闹钟，结果全寝都醒了，就她没醒',
  '床：我这辈子没见过这么粘人的人类',
  '她的运动轨迹：床→厕所→外卖架→床，闭环了',
  '百度地图年度报告：您今年解锁的新地点——0个',
  '辅导员：这个学生我好像只在花名册上见过',
  '外卖小哥给她备注：<b>VVIP 固定客户 不用打电话 放门口</b>',
  '她手机相册80%是躺着拍的，剩下20%是外卖',
  '日均步数487，其中200步是取外卖走的',
  '她说过最多的话：\"帮我带一份，谢谢\"',
  '\"明天一定早起\"——这句话她说了四年',
  '她的微信状态永远是：<b>睡觉中</b>',
  '如果睡觉能加学分，她GPA已经4.5了',
  '她的被窝和她已经有感情了，分不开的那种',
  '能让她主动下床的只有两件事：快递和奶茶',
  '室友：关灯前她还在说话，关灯后0.5秒——她睡着了',
  '让她起床比让她卸载抖音还难',
  '英语课听力播放5分钟后：她已进入深度睡眠',
  '她的特长：坐着睡、趴着睡、靠着睡、任何姿势睡',
  '熄灯后第一个睡，第二天中午最后一个醒，形成完美闭环',
  '室友已经放弃叫她，改为直接帮她把早饭和午饭一起带',
  '她的人生哲学：能躺着解决的问题绝不坐着',
  '同学四年，有人没见过她站着的样子',
  '她的课表：上午睡觉，下午躺着，晚上在床上玩手机',
  '运动会？她的项目是<b>床上躺平大赛</b>，稳拿第一',
  '宿管阿姨：这姑娘是不是身体不舒服？室友：不，她就是懒',
  '她上次跑步是什么时候？<b>没有记录</b>',
  '她的购物车：枕头、靠垫、懒人沙发、各种躺着用的东西',
  '听说她要考研，室友：你确定你能在考场醒着？',
  '她的微信步数排行榜：永远倒数第一，和第二名差一个数量级',
  '天气好她不出门，天气不好她更有理由不出门',
  '她能把\"等一下\"说成\"等一天\"',
  '室友群里的日常：<b>@臧yx 你醒了没？</b>',
  '她上课的姿势永远是：趴着',
];
function toast(msg){
  var t=document.createElement('div');t.className='toast';t.innerHTML=msg;
  t.style.top=(15+Math.random()*50)+'px';
  T.appendChild(t);setTimeout(function(){t.remove()},2400);
}
function p1(){
  A.innerHTML=`
    <div class="card fade-in">
      <p class="m" style="color:#fff;">📋 大学生综合行为评估系统</p>
      <p class="dim">评估委员会：全寝成员 · AI大数据 · 外卖小哥 · 辅导员</p>
      <p class="dim" style="margin-top:8px;">受评人：<span class="y" style="font-size:18px;">臧yx</span></p>
    </div>
    <div class="card fade-in">
      <p class="dim" style="margin-bottom:10px;">评估指标：</p>
      <p class="dim">✓ 起床参与度</p>
      <p class="dim">✓ 寝室→教室位移频率</p>
      <p class="dim">✓ 外卖下单频次</p>
      <p class="dim">✓ 非睡眠时段躺姿时长占比</p>
    </div>
    <button class="btn-go" onclick="p2()" style="font-size:17px;width:100%;">查看数据报告 ▸</button>
    <p class="dim" style="margin-top:10px;">* 报告结果将自动同步至寝室群聊</p>
  `;
}
function p2(){
  A.innerHTML=`
    <div class="card fade-in">
      <p class="m y">⏳ 近30天行为数据汇总</p>
      <p class="dim">数据来源：课表签到 · 外卖平台 · 微信步数 · 室友证言</p>
    </div>
    <div class="card fade-in">
      <p class="dim" style="text-align:left;line-height:2.4;">
        🔍 早课出勤率：<span class="r">13.3%</span>（全班倒数第一）<br>
        🔍 日均外卖：<span class="y">2.7 单</span>（寝室贡献值最高）<br>
        🔍 日均步数：<span class="r">487 步</span>（不到全校平均的零头）<br>
        🔍 躺姿占比：<span class="y">92%</span>（非睡眠时间段）<br>
        🔍 日均屏幕时间：<span class="r">11.4 小时</span><br>
        🔍 寝室到教学楼约300米<br>
        🔍 这300米她打车去过：<span class="y">3 次</span><br>
        🔍 室友帮忙带饭次数：<span class="r">无法统计</span>（太多了）
      </p>
    </div>
    <button class="btn-go" onclick="p3()" style="font-size:17px;width:100%;">进入综合判定 ▸</button>
  `;
}
function p3(){
  clicks=0;refresh();
  A.innerHTML=`
    <div class="card fade-in">
      <p class="m" style="color:#fff;">⚠️ 请根据数据做出判断</p>
      <p style="font-size:24px;font-weight:900;line-height:1.6;margin-top:12px;">
        <span class="y">臧yx</span> 是否<br>好吃且懒做？
      </p>
      <p class="dim" style="margin-top:10px;">请公平公正、凭良心作答</p>
    </div>
    <div style="text-align:center;margin:14px 0;" id="agreeZone">
      <button class="btn-go" id="agreeBtn" onclick="done()" style="font-size:21px;padding:24px;width:90%;">
        ✅ 我认可<br><span style="font-size:12px;font-weight:400;color:#777;">事实胜于雄辩</span>
      </button>
    </div>
    <div style="text-align:center;margin:18px 0;min-height:80px;display:flex;align-items:center;justify-content:center;position:relative;" id="denyZone">
      <button class="btn-deny" id="denyBtn" ontouchstart="hit(event)" onclick="hit(event)">❌ 我不认可</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
      <div class="progress-label" id="progLabel">还需 ${need} 次「我不认可」才能提交</div>
    </div>
  `;
}
function refresh(){
  var p=document.getElementById('prog'),l=document.getElementById('progLabel');
  var rem=need-clicks;if(rem<0)rem=0;
  if(p)p.style.width=(clicks/need*100)+'%';
  if(l){
    if(rem<=0)l.innerHTML='<span class="g">行了行了你可以选了——不甘心也得认</span>';
    else if(clicks>=7)l.innerHTML='还需 <span class="y">'+rem+'</span> 次，快了，坚持住...';
    else if(clicks>=4)l.innerHTML='还需 <span class="y">'+rem+'</span> 次，别挣扎了';
    else l.innerHTML='还需 '+rem+' 次，慢慢点，反正也没用';
  }
}
window.hit=function(e){
  if(e)e.preventDefault();if(moving)return;moving=true;
  clicks++;
  toast(quotes[(clicks-1)%quotes.length]);
  refresh();
  var dz=document.getElementById('denyZone'),db=document.getElementById('denyBtn');
  if(clicks>=need){
    db.style.border='2px solid #8f8';db.style.color='#8f8';
    db.style.fontSize='20px';db.style.padding='22px 32px';
    db.textContent='😤 我不认可！（行吧...）';
    db.onclick=function(e){e.preventDefault();done();};
    moving=false;return;
  }
  var s=Math.max(0.3,1-clicks*0.065);db.style.transform='scale('+s+')';
  var mx=Math.max(dz.clientWidth-db.offsetWidth*s,60);
  var my=Math.max(dz.clientHeight-db.offsetHeight*s,30);
  db.style.position='relative';db.style.left=((Math.random()-.5)*mx)+'px';
  db.style.top=((Math.random()-.5)*my)+'px';
  dz.classList.add('shake');setTimeout(function(){dz.classList.remove('shake')},350);
  var ab=document.getElementById('agreeBtn');
  ab.style.transform='scale('+(1+clicks*0.07)+')';ab.style.transition='transform .3s ease';
  setTimeout(function(){moving=false},280);
};
function done(){
  document.body.style.background='#0a0a16';
  A.innerHTML=`
    <div class="cert fade-in">
      <div class="cert-body">
        <p class="dim">🏆 大学生综合行为评估委员会 🏆</p>
        <p class="dim" style="margin:6px 0;">全寝 · AI · 外卖小哥 · 辅导员 联合认证</p>
        <p class="xl" style="margin:16px 0;">😴</p>
        <p class="m y">经全面、客观、无可辩驳的评估</p>
        <p style="font-size:30px;font-weight:900;color:#c9a84c;margin:12px 0;letter-spacing:3px;">臧 yx</p>
        <p style="font-size:24px;font-weight:800;color:#fff;margin:12px 0;line-height:1.8;">
          荣获<br><span style="font-size:38px;color:#c9a84c;">「睡神」</span><br>终身荣誉称号
        </p>
        <div style="background:rgba(255,255,255,.02);border-radius:12px;padding:16px;margin:16px 0;text-align:left;line-height:2.3;">
          <p class="dim">🏅 日均睡眠：<span class="y">10h+</span>（极度保守估计）</p>
          <p class="dim">🏅 起床失败：<span class="r">不可计数</span></p>
          <p class="dim">🏅 寝室懒人榜：<span class="y">连续N学期第一</span></p>
          <p class="dim">🏅 外卖会员：<span class="y">至尊钻石VIP</span></p>
          <p class="dim">🏅 躺平学造诣：<span class="y">博士后及以上</span></p>
          <p class="dim">🏅 \"再睡五分钟\"次数：<span class="r">∞</span></p>
        </div>
        <p class="dim">发证方：你的好朋友们（非常爱你才做这个）</p>
        <p class="dim">有效期：永久有效</p>
        <p class="dim">（除非你连续一周早起上课，可申请复核）</p>
        <p class="dim" style="margin-top:6px;">证书编号：ZZZ-${new Date().getFullYear()}-${String(clicks||999).padStart(2,'0')}</p>
      </div>
    </div>
    <button class="btn-go" onclick="location.reload()" style="width:100%;margin-top:20px;font-size:16px;padding:18px;">🔄 换个人再测</button>
    <p style="text-align:center;margin-top:28px;color:#333;font-size:12px;">感情不够深做不出这玩意 · 都大学生了别真生气</p>
  `;
}
p1();
</script>
</body>
</html>
